name: Release Build And Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v0.1.2'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-monitor/app/package-lock.json

      - name: Install app deps
        working-directory: agent-monitor/app
        run: npm ci

      - name: Build desktop artifacts
        working-directory: agent-monitor/app
        run: npm run build:artifacts-win

      # 若仓库已配置下方 Secrets，则生成 android/keystore.properties + keystore/*.jks，assembleRelease 使用正式签名；
      # 未配置时沿用 build.gradle 的 debug 签名回退（可安装，证书与正式包不同）。
      - name: Prepare Android release keystore from GitHub Secrets
        shell: pwsh
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
        run: |
          $ErrorActionPreference = "Stop"
          $androidRoot = Join-Path $PWD "agent-monitor/app/android"
          if ([string]::IsNullOrWhiteSpace($env:KEYSTORE_B64)) {
            Write-Host "[Info] 未配置 ANDROID_RELEASE_KEYSTORE_BASE64，Release APK 将使用 debug 证书签名。"
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:STORE_PASSWORD) -or [string]::IsNullOrWhiteSpace($env:KEY_PASSWORD)) {
            throw "已设置 ANDROID_RELEASE_KEYSTORE_BASE64，请同时配置 ANDROID_RELEASE_STORE_PASSWORD 与 ANDROID_RELEASE_KEY_PASSWORD"
          }
          $alias = $(if ([string]::IsNullOrWhiteSpace($env:KEY_ALIAS)) { "cluster_manager" } else { $env:KEY_ALIAS })
          $ksDir = Join-Path $androidRoot "keystore"
          New-Item -ItemType Directory -Force -Path $ksDir | Out-Null
          $ksPath = Join-Path $ksDir "cluster-manager-release.jks"
          [IO.File]::WriteAllBytes($ksPath, [Convert]::FromBase64String($env:KEYSTORE_B64))
          $propsPath = Join-Path $androidRoot "keystore.properties"
          @(
            "storeFile=keystore/cluster-manager-release.jks",
            "storePassword=$($env:STORE_PASSWORD)",
            "keyPassword=$($env:KEY_PASSWORD)",
            "keyAlias=$alias"
          ) | Set-Content -Path $propsPath -Encoding utf8
          Write-Host "[Info] 已写入 release keystore 与 keystore.properties（正式签名）。"

      - name: Build Android apk
        working-directory: agent-monitor/app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          npm run build:mobile
          if ($LASTEXITCODE -ne 0) { throw "npm run build:mobile failed" }
          npx cap sync android
          if ($LASTEXITCODE -ne 0) { throw "npx cap sync android failed" }
          cd android
          .\gradlew.bat assembleRelease --no-daemon
          if ($LASTEXITCODE -ne 0) { throw "gradlew assembleRelease failed" }

      - name: Verify release APK is signed
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $apk = Get-ChildItem "agent-monitor/app/android/app/build/outputs/apk/release" -Filter "*.apk" | Select-Object -First 1
          if ($null -eq $apk) { throw "No APK to verify" }
          $sdkRoot = $env:ANDROID_SDK_ROOT
          if ([string]::IsNullOrWhiteSpace($sdkRoot)) { $sdkRoot = $env:ANDROID_HOME }
          if ([string]::IsNullOrWhiteSpace($sdkRoot)) { throw "ANDROID_SDK_ROOT / ANDROID_HOME not set" }
          $btRoot = Join-Path $sdkRoot "build-tools"
          $btDir = Get-ChildItem $btRoot -Directory -ErrorAction Stop | Sort-Object Name -Descending | Select-Object -First 1
          $apksigner = Join-Path $btDir.FullName "apksigner.bat"
          if (-not (Test-Path -LiteralPath $apksigner)) { throw "apksigner not found: $apksigner" }
          Write-Host "Verifying: $($apk.FullName)"
          & $apksigner verify --verbose $apk.FullName

      - name: Collect release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "agent-monitor/app/release-assets" | Out-Null
          $setupExe = Get-ChildItem "agent-monitor/app/electron-dist" -Filter "*Setup*.exe" | Select-Object -First 1
          if ($null -eq $setupExe) { throw "Setup exe not found in electron-dist" }
          Copy-Item $setupExe.FullName "agent-monitor/app/release-assets/cluster-manager-setup-win-x64.exe" -Force

          $portableExe = Get-ChildItem "agent-monitor/app/electron-dist" -Filter "*.exe" | Where-Object { $_.Name -notlike "*Setup*" } | Select-Object -First 1
          if ($null -eq $portableExe) { throw "Portable exe not found in electron-dist" }
          Copy-Item $portableExe.FullName "agent-monitor/app/release-assets/cluster-manager-portable-win-x64.exe" -Force

          $apk = Get-ChildItem "agent-monitor/app/android/app/build/outputs/apk/release" -Filter "*.apk" | Select-Object -First 1
          if ($null -eq $apk) { throw "No APK found in android release outputs" }
          Copy-Item $apk.FullName "agent-monitor/app/release-assets/cluster-manager-android-release.apk" -Force

      - name: Generate release notes body
        shell: pwsh
        run: |
          $notes = @"
          ## Cluster Manager $env:RELEASE_TAG

          ### 更新内容
          - 自动构建并发布桌面端与移动端安装包
          - 同步最新代码对应产物，避免手工漏传
          - Release 文案统一格式，避免乱码

          ### 安装方式
          - Windows 安装版：cluster-manager-setup-win-x64.exe
          - Windows 便携版：cluster-manager-portable-win-x64.exe
          - Android：cluster-manager-android-release.apk
          "@
          Set-Content -Path "release-notes.md" -Value $notes -Encoding utf8

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Cluster Manager ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: |
            agent-monitor/app/release-assets/cluster-manager-setup-win-x64.exe
            agent-monitor/app/release-assets/cluster-manager-portable-win-x64.exe
            agent-monitor/app/release-assets/cluster-manager-android-release.apk
